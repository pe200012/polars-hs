name:                polars-hs
version:             0.1.0.0
github:              "pe200012/polars-hs"
license:             BSD-3-Clause
author:              "pe200012"
maintainer:          "1326263755@qq.com"
copyright:           "2026 pe200012"

build-type:          Custom

extra-source-files:
- README.md
- CHANGELOG.md
- include/polars_hs.h
- rust/polars-hs-ffi/Cargo.toml
- rust/polars-hs-ffi/Cargo.lock
- rust/polars-hs-ffi/build.rs
- rust/polars-hs-ffi/cbindgen.toml
- rust/polars-hs-ffi/src/*.rs
- test/data/*.csv

synopsis:            Haskell bindings for the Rust Polars dataframe library
category:            Data

description:         Please see the README on GitHub at <https://github.com/pe200012/polars-hs#readme>

custom-setup:
  dependencies:
  - base >= 4.7 && < 5
  - Cabal
  - directory >= 1.3 && < 1.4
  - filepath >= 1.4 && < 1.6

dependencies:
- base >= 4.7 && < 5
- bytestring >= 0.12 && < 0.14
- text >= 2.1 && < 2.3
- filepath >= 1.4 && < 1.6
- directory >= 1.3 && < 1.4

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src
  exposed-modules:
  - Polars
  - Polars.Column
  - Polars.DataFrame
  - Polars.Error
  - Polars.Expr
  - Polars.GroupBy
  - Polars.IPC
  - Polars.Join
  - Polars.LazyFrame
  - Polars.Operators
  - Polars.Schema
  other-modules:
  - Polars.Internal.Bytes
  - Polars.Internal.ColumnDecode
  - Polars.Internal.CString
  - Polars.Internal.Expr
  - Polars.Internal.Managed
  - Polars.Internal.Raw
  - Polars.Internal.Result
  include-dirs:
  - include
  extra-libraries:
  - polars_hs_ffi
  - pthread
  - dl
  - m

executables:
  polars-hs-exe:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - polars-hs

tests:
  polars-hs-test:
    main:                Spec.hs
    source-dirs:         test
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - polars-hs
    - hspec >= 2.11 && < 2.12
